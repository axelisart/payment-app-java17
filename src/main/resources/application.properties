# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Phase 1: spring.jpa.database-platform removed — Hibernate 6 auto-detects H2 dialect.
#           Keeping it would throw UnknownUnwrapTypeException at startup.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=always
# Phase 1: renamed from management.metrics.export.prometheus.enabled (Boot 2.x key silently ignored)
management.prometheus.metrics.export.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.demo.payment=INFO
logging.level.org.springframework.cache=DEBUG

# ── Test-specific overrides ───────────────────────────────────────────────────
# Separate in-memory DB per test run to avoid state bleed between SpringBootTest
# contexts loaded in the same JVM.
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=create-drop

# Suppress noisy Hibernate SQL output during tests
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.cache=WARN
logging.level.com.demo.payment=WARN

# Keep actuator endpoints available for health-probe test
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ──────────────────────────────────────────────────────────────────────────────
# ansible.cfg
#
# Ansible configuration for the payment-app playbook.
# This file is picked up automatically when ansible-playbook is run from the
# payment-app-java17/infra/ansible/ directory.
# ──────────────────────────────────────────────────────────────────────────────

[defaults]
# ── Inventory ─────────────────────────────────────────────────────────────────
inventory          = inventory/hosts.yml
roles_path         = roles

# ── Output and display ────────────────────────────────────────────────────────
# stdout_callback = yaml makes output far more readable for Kubernetes tasks.
# Use built-in yaml result format (community.general.yaml removed in v12)
stdout_callback    = default
result_format      = yaml
# Show task execution time after each play for performance analysis.
callback_enabled   = timer, profile_tasks

# ── Connection defaults ───────────────────────────────────────────────────────
# All tasks use kubernetes.core modules — SSH is never used.
transport          = local
# Do not attempt to gather facts via SSH connection (no remote host).
gathering          = explicit

# ── Retry and timeout ─────────────────────────────────────────────────────────
# How many times a task with retries: N will retry before failing.
task_timeout       = 600
# Do not create .retry files on failure — they are noise in a CI environment.
retry_files_enabled = false

# ── Security ──────────────────────────────────────────────────────────────────
# Show diffs for changed tasks (useful for ConfigMap and Secret key presence checks).
# NOTE: diff output for Secrets is suppressed by no_log: true on those tasks.
diff                = false    # set to true with --diff flag per-run; off by default

# Vault password file — set to a file containing only the vault password.
# Uncomment and configure for environments using ansible-vault encrypted vars.
# vault_password_file = ~/.vault_pass_payment_app

# ── Collection requirements ───────────────────────────────────────────────────
# Required collections (install before running):
#   ansible-galaxy collection install -r requirements.yml
# collections_paths  = ~/.ansible/collections:/usr/share/ansible/collections

[privilege_escalation]
# No privilege escalation needed — all tasks run against the Kubernetes API.
become      = false
become_user = root

[ssh_connection]
# Disable SSH multiplexing — all connections are local (kubernetes.core modules).
ssh_args       = -o ControlMaster=no
pipelining     = false

---
# ──────────────────────────────────────────────────────────────────────────────
# inventory/hosts.yml
#
# Static inventory for the payment-app Ansible playbook.
#
# The playbook targets a SINGLE OpenShift cluster and configures TWO namespaces:
#   • bob-demo-staging
#   • bob-demo-prod
#
# Because Ansible's kubernetes.core modules connect to the cluster API rather
# than SSHing into hosts, the "host" here is localhost (the control node that
# runs the playbook). The cluster connection details are passed via group_vars.
#
# Credentials are NEVER stored in this file. They are injected at runtime via:
#   export ANSIBLE_OPENSHIFT_TOKEN="$(oc whoami -t)"
#   export ANSIBLE_OPENSHIFT_HOST="$(oc whoami --show-server)"
#   ansible-playbook -i inventory/hosts.yml playbook.yml
#
# For Ansible Vault, see group_vars/all/vault.yml.example
# ──────────────────────────────────────────────────────────────────────────────
all:
  children:

    # ── openshift_cluster ─────────────────────────────────────────────────────
    # A single logical host representing the OpenShift cluster API endpoint.
    # Ansible connects to this "host" using the kubernetes.core collection,
    # so connection: local is correct — no SSH is involved.
    openshift_cluster:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

      vars:
        # ── OpenShift API connection ───────────────────────────────────────────
        # These two variables are required by every kubernetes.core task.
        # Supply them via environment variables or Ansible Vault — never hardcode.
        #
        # At runtime:
        #   export K8S_AUTH_HOST="https://api.my-cluster.example.com:6443"
        #   export K8S_AUTH_API_KEY="$(oc whoami -t)"
        #
        # kubernetes.core picks up K8S_AUTH_HOST and K8S_AUTH_API_KEY automatically.
        # These vars are provided here as documentation and fallback references;
        # they are intentionally left empty so the environment variables take
        # precedence (Ansible evaluates env vars before inventory vars for k8s auth).
        k8s_auth_host: "{{ lookup('env', 'K8S_AUTH_HOST') }}"
        k8s_auth_api_key: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
        # Set to true ONLY for development clusters with self-signed certificates.
        k8s_auth_verify_ssl: true

    # ── staging ───────────────────────────────────────────────────────────────
    # Logical group for the staging namespace configuration pass.
    staging:
      hosts:
        localhost:
      vars:
        env_label: staging
        k8s_namespace: bob-demo-staging
        postgres_db: paymentdb_staging
        # Secret name that Terraform named in the architecture diagram.
        postgres_secret_name: postgres-credentials
        configmap_name: payment-app-config
        service_account_name: payment-service-sa
        postgres_service_name: postgres-service
        postgres_service_port: 5432
        # JDBC URL consumed by the payment-service Spring Boot application.
        # Uses the in-namespace short DNS form — no FQDN needed within the same namespace.
        db_url: "jdbc:postgresql://postgres-service:5432/paymentdb_staging"
        # Placeholder — supply real value via Ansible Vault or environment variable:
        #   ANSIBLE_VAR_db_user=...  or vault-encrypted group_vars
        db_user: "{{ vault_db_user_staging | default('PLACEHOLDER_STAGING_DB_USER') }}"
        db_password: "{{ vault_db_password_staging | default('PLACEHOLDER_STAGING_DB_PASSWORD') }}"

    # ── prod ──────────────────────────────────────────────────────────────────
    prod:
      hosts:
        localhost:
      vars:
        env_label: prod
        k8s_namespace: bob-demo-prod
        postgres_db: paymentdb_prod
        postgres_secret_name: postgres-credentials
        configmap_name: payment-app-config
        service_account_name: payment-service-sa
        postgres_service_name: postgres-service
        postgres_service_port: 5432
        db_url: "jdbc:postgresql://postgres-service:5432/paymentdb_prod"
        db_user: "{{ vault_db_user_prod | default('PLACEHOLDER_PROD_DB_USER') }}"
        db_password: "{{ vault_db_password_prod | default('PLACEHOLDER_PROD_DB_PASSWORD') }}"

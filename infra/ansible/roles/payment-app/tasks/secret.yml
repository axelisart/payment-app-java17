---
# ──────────────────────────────────────────────────────────────────────────────
# roles/payment-app/tasks/secret.yml
#
# Creates (or idempotently updates) the postgres-credentials Kubernetes Secret
# in the target namespace.
#
# Secret keys match the Spring Boot property binding used by the payment-service:
#   DB_URL      → spring.datasource.url
#   DB_USER     → spring.datasource.username
#   DB_PASSWORD → spring.datasource.password
#
# The kubernetes.core.k8s module base64-encodes secret data automatically when
# resource_definition.stringData is used — no manual base64 encoding required.
#
# Idempotency: apply state=present with force=false means the Secret is created
# on first run and left unchanged on subsequent runs unless the template changes.
# To rotate credentials, run with --extra-vars "db_password=<new>" — the task
# will update the Secret in-place without deleting it.
#
# Security note: Ansible logs are suppressed for this task (no_log: true) to
# prevent credential values from appearing in stdout, callback plugins, or
# Ansible Tower/AWX job output.
# ──────────────────────────────────────────────────────────────────────────────

- name: "{{ namespace }} | secret | Apply postgres-credentials Secret"
  kubernetes.core.k8s:
    state: present
    namespace: "{{ namespace }}"
    resource_definition: "{{ lookup('template', 'postgres-credentials.yml.j2') | from_yaml }}"
    # apply=true performs a server-side apply (strategic merge patch) so the
    # task is safe to re-run — it will only update fields that changed.
    apply: true
    force: false
  no_log: true     # suppress Secret values from all Ansible output
  register: secret_result

- name: "{{ namespace }} | secret | Report outcome"
  ansible.builtin.debug:
    msg: >-
      Secret '{{ postgres_secret_name }}' in namespace '{{ namespace }}':
      {{ 'created' if secret_result.changed else 'already up to date' }}
  # This debug task does NOT print the Secret values — only its change status.

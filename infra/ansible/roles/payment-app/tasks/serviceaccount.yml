---
# ──────────────────────────────────────────────────────────────────────────────
# roles/payment-app/tasks/serviceaccount.yml
#
# Verifies (read-only, non-mutating) that the ServiceAccount and its Role
# were correctly provisioned by Terraform.
#
# Ansible is NOT the source-of-truth for the ServiceAccount or Role — Terraform
# owns those resources. These tasks assert that:
#   1. The ServiceAccount exists and has automountServiceAccountToken: false
#   2. The Role exists with the correct, least-privilege rules
#   3. The RoleBinding binds the Role to the ServiceAccount
#
# If any assertion fails, the playbook aborts with a clear error message before
# attempting to create the Secret or ConfigMap in a misconfigured namespace.
#
# Why read-only? Mutating the SA or Role from Ansible would create drift between
# the Ansible-managed state and Terraform's state file, leading to conflicts on
# the next `terraform apply`. Ansible only asserts — Terraform manages.
# ──────────────────────────────────────────────────────────────────────────────

# ── 1. Assert ServiceAccount exists ──────────────────────────────────────────
- name: "{{ k8s_namespace }} | rbac | Fetch ServiceAccount '{{ service_account_name }}'"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ServiceAccount
    name: "{{ service_account_name }}"
    namespace: "{{ k8s_namespace }}"
  register: sa_info

- name: "{{ k8s_namespace }} | rbac | Assert ServiceAccount exists"
  ansible.builtin.assert:
    that:
      - sa_info.resources | length == 1
    fail_msg: >-
      ServiceAccount '{{ service_account_name }}' not found in namespace
      '{{ k8s_namespace }}'. Run `terraform apply` before this playbook.
    success_msg: "ServiceAccount '{{ service_account_name }}' exists ✔"

- name: "{{ k8s_namespace }} | rbac | Assert automountServiceAccountToken is false"
  ansible.builtin.assert:
    that:
      # automountServiceAccountToken defaults to null (not false) when not set;
      # Terraform sets it explicitly to false — treat null as acceptable too
      # since the cluster default for named SAs is also not to auto-mount.
      - >-
        sa_info.resources[0].automountServiceAccountToken == false
        or sa_info.resources[0].automountServiceAccountToken is not defined
    fail_msg: >-
      ServiceAccount '{{ service_account_name }}' has automountServiceAccountToken: true.
      This is a security misconfiguration — re-run `terraform apply` to correct it.
    success_msg: "automountServiceAccountToken is correctly set to false ✔"

# ── 2. Assert Role exists with correct rules ──────────────────────────────────
- name: "{{ k8s_namespace }} | rbac | Fetch Role '{{ expected_role_name }}'"
  kubernetes.core.k8s_info:
    api_version: rbac.authorization.k8s.io/v1
    kind: Role
    name: "{{ expected_role_name }}"
    namespace: "{{ k8s_namespace }}"
  register: role_info

- name: "{{ k8s_namespace }} | rbac | Assert Role exists"
  ansible.builtin.assert:
    that:
      - role_info.resources | length == 1
    fail_msg: >-
      Role '{{ expected_role_name }}' not found in namespace '{{ k8s_namespace }}'.
      Run `terraform apply` before this playbook.
    success_msg: "Role '{{ expected_role_name }}' exists ✔"

- name: "{{ k8s_namespace }} | rbac | Assert Role grants secret read on postgres-credentials only"
  ansible.builtin.assert:
    that:
      # Verify the secrets rule exists with exactly the right resource_names.
      - >-
        role_info.resources[0].rules
        | selectattr('resources', 'contains', 'secrets')
        | selectattr('resourceNames', 'defined')
        | list
        | length >= 1
      - >-
        role_info.resources[0].rules
        | selectattr('resources', 'contains', 'secrets')
        | map(attribute='resourceNames')
        | flatten
        | list
        == ['postgres-credentials']
    fail_msg: >-
      Role '{{ expected_role_name }}' does not grant the expected secret access
      to 'postgres-credentials'. Check Terraform Role resource and re-apply.
    success_msg: "Role grants read on 'postgres-credentials' only ✔"

- name: "{{ k8s_namespace }} | rbac | Assert Role grants configmap read on payment-app-config only"
  ansible.builtin.assert:
    that:
      - >-
        role_info.resources[0].rules
        | selectattr('resources', 'contains', 'configmaps')
        | selectattr('resourceNames', 'defined')
        | list
        | length >= 1
      - >-
        role_info.resources[0].rules
        | selectattr('resources', 'contains', 'configmaps')
        | map(attribute='resourceNames')
        | flatten
        | list
        == ['payment-app-config']
    fail_msg: >-
      Role '{{ expected_role_name }}' does not grant the expected configmap access
      to 'payment-app-config'. Check Terraform Role resource and re-apply.
    success_msg: "Role grants read on 'payment-app-config' only ✔"

# ── 3. Assert RoleBinding exists and binds SA to Role ─────────────────────────
- name: "{{ k8s_namespace }} | rbac | Fetch RoleBinding 'payment-app-rolebinding'"
  kubernetes.core.k8s_info:
    api_version: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    name: payment-app-rolebinding
    namespace: "{{ k8s_namespace }}"
  register: rb_info

- name: "{{ k8s_namespace }} | rbac | Assert RoleBinding exists"
  ansible.builtin.assert:
    that:
      - rb_info.resources | length == 1
    fail_msg: >-
      RoleBinding 'payment-app-rolebinding' not found in namespace '{{ k8s_namespace }}'.
      Run `terraform apply` before this playbook.
    success_msg: "RoleBinding 'payment-app-rolebinding' exists ✔"

- name: "{{ k8s_namespace }} | rbac | Assert RoleBinding references the correct ServiceAccount"
  ansible.builtin.assert:
    that:
      - >-
        rb_info.resources[0].subjects
        | selectattr('name', 'equalto', service_account_name)
        | selectattr('kind', 'equalto', 'ServiceAccount')
        | list
        | length == 1
    fail_msg: >-
      RoleBinding 'payment-app-rolebinding' does not bind to ServiceAccount
      '{{ service_account_name }}'. Check Terraform RoleBinding resource.
    success_msg: "RoleBinding correctly binds '{{ service_account_name }}' ✔"

- name: "{{ k8s_namespace }} | rbac | Report RBAC verification complete"
  ansible.builtin.debug:
    msg: "RBAC verification passed for namespace '{{ k8s_namespace }}' ✔"

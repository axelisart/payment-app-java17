# ──────────────────────────────────────────────────────────────────────────────
# ci-cd.yml — Build, push and deploy payment-app to OpenShift ROKS
#
# Pipeline stages:
#   1. build-and-push  — Maven build → Docker image → push to OpenShift registry
#   2. deploy-staging  — oc apply k8s/deployment.yaml to bob-demo-staging
#   3. deploy-prod     — same, but requires manual approval (environment gate)
#
# Required GitHub Actions secrets (provisioned by Terraform app workspace):
#   OPENSHIFT_SERVER    — https://c115-e.eu-de.containers.cloud.ibm.com:<port>
#   OPENSHIFT_TOKEN     — service account token (CI SA)
#   OPENSHIFT_REGISTRY  — default-route-openshift-image-registry.apps.<domain>
#   NAMESPACE_STAGING   — bob-demo-staging
#   NAMESPACE_PROD      — bob-demo-prod
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD — payment-app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: payment-app

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build JAR + Docker image, push to OpenShift registry
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Cache Maven local repository ─────────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Build and test ────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Build with Maven
        run: mvn --batch-mode package

      # ── Compute image tag (short SHA) ─────────────────────────────────────
      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Log in to OpenShift internal registry ────────────────────────────
      - name: Log in to OpenShift registry
        run: |
          docker login "${{ secrets.OPENSHIFT_REGISTRY }}" \
            --username unused \
            --password "${{ secrets.OPENSHIFT_TOKEN }}"

      # ── Build and push to staging image stream ────────────────────────────
      # The image is pushed once to staging; the prod job reuses the same tag.
      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.OPENSHIFT_REGISTRY }}/${{ secrets.NAMESPACE_STAGING }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" \
            -t "${{ secrets.OPENSHIFT_REGISTRY }}/${{ secrets.NAMESPACE_STAGING }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push image to staging namespace
        run: |
          docker push "${{ secrets.OPENSHIFT_REGISTRY }}/${{ secrets.NAMESPACE_STAGING }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          docker push "${{ secrets.OPENSHIFT_REGISTRY }}/${{ secrets.NAMESPACE_STAGING }}/${{ env.IMAGE_NAME }}:latest"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy to staging
  # ════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy on pushes to main — not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: staging
      url: https://payment-app-${{ secrets.NAMESPACE_STAGING }}.apps.${{ secrets.OPENSHIFT_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Log in to OpenShift
        run: |
          oc login \
            --server="${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false

      - name: Deploy to staging
        env:
          NAMESPACE: ${{ secrets.NAMESPACE_STAGING }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          # Substitute NAMESPACE and IMAGE_TAG then apply
          sed -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              -e "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" \
              k8s/deployment.yaml \
          | oc apply -f - -n "${NAMESPACE}"

      - name: Wait for rollout
        run: |
          oc rollout status deployment/payment-app \
            -n "${{ secrets.NAMESPACE_STAGING }}" \
            --timeout=5m

      - name: Smoke test — /actuator/health
        run: |
          ROUTE=$(oc get route payment-app \
            -n "${{ secrets.NAMESPACE_STAGING }}" \
            -o jsonpath='{.spec.host}')
          curl --retry 5 --retry-delay 10 --fail \
            "https://${ROUTE}/actuator/health" | grep -q '"status":"UP"'
          echo "✅ Staging smoke test passed"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to production (manual approval gate)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # The "production" environment must be configured in GitHub repo settings
    # with at least one required reviewer — this creates the manual approval gate.
    environment:
      name: production
      url: https://payment-app-${{ secrets.NAMESPACE_PROD }}.apps.${{ secrets.OPENSHIFT_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Log in to OpenShift
        run: |
          oc login \
            --server="${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false

      # Re-tag the staging image into the prod namespace image stream
      - name: Tag image into prod namespace
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          oc tag \
            "${{ secrets.NAMESPACE_STAGING }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            "${{ secrets.NAMESPACE_PROD }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            "${{ secrets.NAMESPACE_PROD }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy to production
        env:
          NAMESPACE: ${{ secrets.NAMESPACE_PROD }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          sed -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              -e "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" \
              k8s/deployment.yaml \
          | oc apply -f - -n "${NAMESPACE}"

      - name: Wait for rollout
        run: |
          oc rollout status deployment/payment-app \
            -n "${{ secrets.NAMESPACE_PROD }}" \
            --timeout=5m

      - name: Smoke test — /actuator/health
        run: |
          ROUTE=$(oc get route payment-app \
            -n "${{ secrets.NAMESPACE_PROD }}" \
            -o jsonpath='{.spec.host}')
          curl --retry 5 --retry-delay 10 --fail \
            "https://${ROUTE}/actuator/health" | grep -q '"status":"UP"'
          echo "✅ Production smoke test passed"
